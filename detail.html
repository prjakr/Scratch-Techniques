<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>テクニック詳細 - Scratch Techniques</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<!-- Page Header -->
<header class="header">
  <div class="header-inner">
    <button id="back-btn" class="btn btn-ghost btn-icon" title="戻る">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h1 id="detail-title" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:1.1rem">読み込み中...</h1>
    <div class="header-actions">
      <button id="edit-btn" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        編集
      </button>
      <button id="delete-btn" class="btn btn-danger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
        削除
      </button>
      <button class="theme-toggle" onclick="toggleDarkMode()" title="ダークモード">🌙</button>
      <a href="index.html" class="btn btn-ghost btn-icon" title="ホーム">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
    </div>
  </div>
</header>

<!-- Main Content -->
<div class="detail-main">

  <!-- Left Column -->
  <div class="detail-left">

    <!-- Scratch Window -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Scratch プログラム
        </span>
      </div>
      <div id="scratch-container">
        <!-- rendered by JS -->
      </div>
    </div>


  </div><!-- /.detail-left -->

  <!-- Right Column -->
  <div class="detail-right">

    <!-- Description -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          解説
        </span>
      </div>
      <div class="panel-body">
        <div class="description-content" id="description-content">
          <!-- rendered by JS -->
        </div>
      </div>
    </div>

    <!-- Metadata -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          情報
        </span>
      </div>
      <div class="panel-body">
        <div class="meta-list" id="meta-list">
          <!-- rendered by JS -->
        </div>
      </div>
    </div>

    <!-- SB3 File -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          .sb3 ファイル
        </span>
      </div>
      <div class="sb3-panel" id="sb3-panel">
        <!-- rendered by JS -->
      </div>
    </div>

  </div><!-- /.detail-right -->

</div><!-- /.detail-main -->

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>🗑️ テクニックを削除しますか？</h3>
    <p>「<span id="modal-title-text"></span>」を削除します。この操作は取り消せません。<br>関連するファイルもGoogle Driveから削除されます。</p>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn btn-ghost">キャンセル</button>
      <button id="modal-delete" class="btn btn-danger">削除する</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/app.js"></script>
<script src="js/detail.js"></script>

<script>
  // Set modal title when delete is clicked
  document.getElementById('delete-btn')?.addEventListener('click', () => {
    document.getElementById('modal-title-text').textContent =
      currentTechnique?.title || '';
  });
</script>
</body>
</html>
