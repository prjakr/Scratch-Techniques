<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>テクニックを追加 - Scratch Techniques</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>保存中...</p>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <button id="cancel-btn" class="btn btn-ghost btn-icon" title="キャンセル">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <span class="logo-text" style="font-size:1rem">テクニックを追加</span>
    <div class="header-actions" style="margin-left:auto">
      <button class="theme-toggle" onclick="toggleDarkMode()" title="ダークモード">🌙</button>
      <a href="index.html" class="btn btn-ghost btn-sm">キャンセル</a>
      <button type="submit" form="technique-form" id="save-btn" class="btn btn-primary">
        ✓ 追加する
      </button>
    </div>
  </div>
</header>

<!-- Form -->
<div class="form-page">
  <div class="form-card">
    <h2>➕ 新しいテクニックを追加</h2>

    <form id="technique-form">

      <!-- Title -->
      <div class="form-row">
        <label for="title">タイトル <span class="required">*</span></label>
        <input type="text" id="title" name="title"
          placeholder="例: スクロール背景の作り方"
          maxlength="100" autocomplete="off">
        <span class="field-error" id="title-error"></span>
      </div>

      <!-- Category & Tags row -->
      <div class="form-row-2">
        <!-- Category -->
        <div>
          <label for="category">カテゴリ</label>
          <select id="category" name="category">
            <!-- options added by JS -->
          </select>
        </div>
        <!-- Tags -->
        <div>
          <label>タグ <span style="font-weight:400;color:var(--text-muted);font-size:0.8rem">（Enterで追加、最大10個）</span></label>
          <div class="tags-input-wrap" id="tags-wrap">
            <input type="text" id="tag-input" class="tag-text-input"
              placeholder="タグを入力..." maxlength="20">
          </div>
        </div>
      </div>

      <!-- Scratch URL -->
      <div class="form-row">
        <label for="scratch-url">Scratch プロジェクトURL</label>
        <input type="url" id="scratch-url" name="scratch-url"
          placeholder="https://scratch.mit.edu/projects/123456789"
          autocomplete="off">
        <p class="input-hint">ScratchプロジェクトのURLを入力するとプレビューできます</p>
        <div id="scratch-url-preview" class="mt-3"></div>
      </div>

      <!-- Description -->
      <div class="form-row">
        <label for="description">解説 <span style="font-weight:400;color:var(--text-muted);font-size:0.8rem">（Markdownが使えます）</span></label>
        <div class="tab-bar">
          <button type="button" class="tab-btn active" id="tab-write">✏️ 書く</button>
          <button type="button" class="tab-btn" id="tab-preview">👁 プレビュー</button>
        </div>
        <div class="tab-panel active" id="panel-write">
          <textarea id="description" name="description"
            placeholder="テクニックの説明を書いてください。&#10;&#10;## 実装方法&#10;1. まず～&#10;2. 次に～&#10;&#10;## ポイント&#10;- 重要なこと"
            rows="10"></textarea>
        </div>
        <div class="tab-panel" id="panel-preview">
          <div class="preview-area description-content" id="preview-area"></div>
        </div>
      </div>

      <!-- SB3 File -->
      <div class="form-row">
        <label>.sb3 ファイル</label>
        <div class="file-upload-area" id="sb3-area" style="padding:20px">
          <input type="file" id="sb3-file" accept=".sb3,.sb2,.sb">
          <span class="upload-icon">📦</span>
          <p class="upload-text">クリックして.sb3ファイルを選択</p>
          <p class="upload-hint">Scratchプロジェクトファイル (.sb3)</p>
        </div>
        <div id="sb3-info" class="mt-3"></div>
      </div>

      <div class="form-actions">
        <button type="button" id="cancel-btn2" class="btn btn-ghost btn-lg"
          onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'">
          キャンセル
        </button>
        <button type="submit" id="save-btn2" class="btn btn-primary btn-lg">
          ✓ 追加する
        </button>
      </div>

    </form>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/app.js"></script>
<script src="js/add.js"></script>

</body>
</html>
