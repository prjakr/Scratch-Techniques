<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scratch Techniques - ダッシュボード</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
</head>
<body>

<!-- Portal Screen -->
<div id="portal-screen" style="display:none">
  <div class="portal-stars"></div>
  <div class="portal-wrap">
    <span class="portal-logo">🐱</span>
    <h1 class="portal-title">Scratch World</h1>
    <p class="portal-sub">なにをする？</p>
    <div class="portal-choices">
      <button class="portal-card portal-tech" onclick="chooseApp('techniques')">
        <span class="portal-card-icon">🎮</span>
        <h2>テクニック集</h2>
        <p>プログラミングの<br>テクニックを管理・学習</p>
        <span class="portal-arrow">→</span>
      </button>
      <button class="portal-card portal-study" onclick="chooseApp('study')">
        <span class="portal-card-icon">📚</span>
        <h2>べんきょうアプリ</h2>
        <p>Scratchで楽しく<br>勉強しよう！</p>
        <span class="portal-arrow">→</span>
      </button>
      <button class="portal-card portal-microbit" onclick="chooseApp('microbit')">
        <span class="portal-card-icon">🔲</span>
        <h2>マイクロビット</h2>
        <p>センサーずかんと<br>かいろのきほん</p>
        <span class="portal-arrow">→</span>
      </button>
    </div>
    <p class="portal-footer">
      <a href="settings.html">⚙️ 設定</a>
    </p>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>データを読み込み中...</p>
</div>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <span class="auth-logo">🐱</span>
    <h1>Scratch Techniques</h1>
    <p>Scratchのプログラミングテクニックを<br>整理・検索・共有できるシステム</p>
    <div class="auth-features">
      <div class="auth-feature"><span>🔍</span><span>検索・フィルター</span></div>
      <div class="auth-feature"><span>✨</span><span>Gemini AI連携</span></div>
      <div class="auth-feature"><span>☁️</span><span>Google Drive保存</span></div>
      <div class="auth-feature"><span>📦</span><span>sb3ファイル管理</span></div>
    </div>
    <button id="signin-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Googleでサインイン
    </button>
    <p style="font-size:0.78rem;color:var(--text-light);margin-top:16px">
      初めての方は <a href="settings.html" style="color:var(--primary);font-weight:600">設定ページ</a> でAPIキーを設定してください
    </p>
  </div>
</div>

<!-- App Content -->
<div id="app-content" class="hidden">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🐱</span>
        <span class="logo-text">Scratch Techniques</span>
      </a>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" class="search-input"
          placeholder="テクニックを検索..." autocomplete="off">
      </div>
      <div class="header-actions">
        <a href="study.html" class="btn btn-ghost btn-sm" title="勉強アプリ">📚 べんきょう</a>
        <a href="https://prjakr.github.io/microbit-app/" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" title="マイクロビット">🔲 マイクロビット</a>
<a href="add.html" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          追加
        </a>
        <a href="settings.html" class="btn btn-ghost btn-icon" title="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </a>
        <button class="theme-toggle" onclick="toggleDarkMode()" title="ダークモード">🌙</button>
        <button class="btn btn-ghost btn-icon" onclick="signOut()" title="サインアウト">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Category Bar -->
  <nav class="category-bar">
    <ul class="category-list" id="category-list">
      <!-- rendered by JS -->
    </ul>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <h2 id="count-display">読み込み中...</h2>
    </div>
    <div class="cards-grid" id="cards-grid">
      <!-- rendered by JS -->
    </div>
  </main>

</div><!-- /#app-content -->

<!-- Add FAB -->
<a href="add.html" class="fab" id="fab-add" title="テクニックを追加" style="display:none">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M12 5v14M5 12h14"/>
  </svg>
</a>

<style>
  #app-content.hidden { display: none; }
  #auth-screen { display: none; }
  #auth-screen.visible { display: flex; }
</style>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/claude.js"></script>
<script>
  function chooseApp(mode) {
    document.getElementById('portal-screen').style.display = 'none';
    if (mode === 'study') { window.location.href = 'study.html'; return; }
    if (mode === 'microbit') { window.location.href = 'https://prjakr.github.io/microbit-app/'; return; }
    document.getElementById('auth-screen').classList.add('visible');
  }

  // Show FAB after sign in
  const origOnSignIn = onSignIn;
  window.onSignIn = async function() {
    await origOnSignIn();
    document.getElementById('fab-add').style.display = '';
  };
</script>
</body>
</html>
